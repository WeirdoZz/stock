<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { display: flex; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f7f7f8; color: #1a1a1a; }

  /* Sidebar */
  #sidebar {
    width: 180px; min-width: 180px; background: #202123; color: #ececec;
    display: flex; flex-direction: column; padding: 16px 8px; gap: 6px; overflow-y: auto;
  }
  #sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #8e8ea0; padding: 4px 8px 8px; }
  .ticker-row {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 4px; border-radius: 6px;
  }
  .ticker-row:hover { background: #2a2b32; }
  .ticker-btn {
    background: none; border: none; color: #ececec; cursor: pointer;
    text-align: left; padding: 4px 6px; border-radius: 4px; font-size: 13px; font-weight: 500;
    flex: 1; min-width: 0;
  }
  .ticker-meta {
    font-size: 10px; color: #8e8ea0; white-space: nowrap; padding: 0 2px;
  }
  .ticker-meta.stale { color: #f87171; }
  .sync-btn {
    background: none; border: none; color: #8e8ea0; cursor: pointer;
    font-size: 13px; padding: 2px 4px; border-radius: 4px; line-height: 1;
    flex-shrink: 0;
  }
  .sync-btn:hover { color: #ececec; background: #3a3b42; }
  .sync-btn.spinning { animation: spin 1s linear infinite; color: #10a37f; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* Messages */
  #messages {
    flex: 1; overflow-y: auto; padding: 24px 16px; display: flex; flex-direction: column; gap: 16px;
  }
  .msg { display: flex; gap: 10px; max-width: 860px; width: 100%; margin: 0 auto; }
  .msg.user { flex-direction: row-reverse; }
  .bubble {
    padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px;
    max-width: 80%; white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .bubble { background: #10a37f; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: #fff; border: 1px solid #e5e5e5; border-bottom-left-radius: 4px; }
  .bubble.status { color: #8e8ea0; font-style: italic; background: transparent; border: none; padding: 4px 0; }
  .bubble.error { background: #fef2f2; border-color: #fca5a5; color: #b91c1c; }

  /* Markdown in assistant bubbles */
  .bubble h1, .bubble h2, .bubble h3 { margin: .8em 0 .4em; }
  .bubble p { margin: .4em 0; }
  .bubble ul, .bubble ol { padding-left: 1.4em; margin: .4em 0; }
  .bubble code { background: #f3f4f6; padding: 1px 4px; border-radius: 4px; font-size: 12px; }
  .bubble pre { background: #f3f4f6; padding: 10px; border-radius: 6px; overflow-x: auto; margin: .5em 0; }
  .bubble pre code { background: none; padding: 0; }
  .bubble table { border-collapse: collapse; width: 100%; margin: .5em 0; font-size: 13px; }
  .bubble th, .bubble td { border: 1px solid #e5e5e5; padding: 6px 10px; }
  .bubble th { background: #f9fafb; }

  /* Input bar */
  #input-bar {
    border-top: 1px solid #e5e5e5; background: #fff; padding: 14px 16px;
    display: flex; gap: 10px; align-items: flex-end;
  }
  #msg-input {
    flex: 1; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px 14px;
    font-size: 14px; resize: none; outline: none; max-height: 120px; line-height: 1.5;
    font-family: inherit;
  }
  #msg-input:focus { border-color: #10a37f; }
  #send-btn {
    background: #10a37f; color: #fff; border: none; border-radius: 8px;
    padding: 10px 18px; font-size: 14px; cursor: pointer; white-space: nowrap;
  }
  #send-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  #send-btn:hover:not(:disabled) { background: #0d8f6e; }

  /* Welcome */
  #welcome { text-align: center; color: #8e8ea0; margin: auto; }
  #welcome h2 { font-size: 20px; margin-bottom: 8px; color: #1a1a1a; }
  #welcome p { font-size: 14px; }
</style>
</head>
<body>

<div id="sidebar">
  <h3>Tickers</h3>
  <!-- populated by JS -->
</div>

<div id="main">
  <div id="messages">
    <div id="welcome">
      <h2>Stock Analysis Agent</h2>
      <p>Ask about any tracked ticker — e.g. "AAPL 趋势怎么样？"</p>
    </div>
  </div>
  <div id="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Ask about a stock..."></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  let sessionId = null;
  let isStreaming = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const sidebar = document.getElementById('sidebar');

  // ── Load tickers ────────────────────────────────────────────────────────────
  const tickerRows = {}; // ticker -> { metaEl, syncBtnEl, pollTimer }

  function fmtDate(isoStr) {
    if (!isoStr) return null;
    const d = new Date(isoStr);
    const now = new Date();
    const diffDays = Math.floor((now - d) / 86400000);
    if (diffDays === 0) return '今天';
    if (diffDays === 1) return '昨天';
    return diffDays + '天前';
  }

  function updateTickerMeta(ticker, status) {
    const row = tickerRows[ticker];
    if (!row) return;
    const { metaEl, syncBtnEl } = row;
    const syncState = status.sync_status || 'idle';

    if (syncState === 'running') {
      syncBtnEl.classList.add('spinning');
      syncBtnEl.title = '同步中...';
      metaEl.textContent = '同步中';
      metaEl.className = 'ticker-meta';
    } else {
      syncBtnEl.classList.remove('spinning');
      syncBtnEl.title = '同步数据';
      if (!status.last_price_date) {
        metaEl.textContent = '未同步';
        metaEl.className = 'ticker-meta stale';
      } else {
        const label = fmtDate(status.last_price_date);
        const stale = (status.days_stale != null && status.days_stale >= 1);
        metaEl.textContent = label;
        metaEl.className = 'ticker-meta' + (stale ? ' stale' : '');
      }
    }
  }

  function startSyncPoll(ticker) {
    const row = tickerRows[ticker];
    if (!row) return;
    if (row.pollTimer) clearInterval(row.pollTimer);
    row.pollTimer = setInterval(() => {
      fetch('/api/sync/status/' + ticker)
        .then(r => r.json())
        .then(st => {
          updateTickerMeta(ticker, { ...st, sync_status: st.status });
          if (st.status !== 'running') {
            clearInterval(row.pollTimer);
            row.pollTimer = null;
            // Refresh price date from /api/status after sync finishes
            fetch('/api/status/' + ticker)
              .then(r => r.json())
              .then(s => updateTickerMeta(ticker, { ...s, sync_status: 'idle' }))
              .catch(() => {});
          }
        })
        .catch(() => { clearInterval(row.pollTimer); row.pollTimer = null; });
    }, 2000);
  }

  function triggerSync(ticker) {
    const row = tickerRows[ticker];
    if (!row) return;
    // Optimistically show running state
    updateTickerMeta(ticker, { sync_status: 'running' });
    fetch('/api/sync/' + ticker, { method: 'POST' })
      .then(() => startSyncPoll(ticker))
      .catch(() => {});
  }

  fetch('/api/tickers')
    .then(r => r.json())
    .then(tickers => {
      tickers.forEach(t => {
        const row = document.createElement('div');
        row.className = 'ticker-row';

        const btn = document.createElement('button');
        btn.className = 'ticker-btn';
        btn.textContent = t;
        btn.onclick = () => { inputEl.value = t + ' '; inputEl.focus(); };

        const metaEl = document.createElement('span');
        metaEl.className = 'ticker-meta';
        metaEl.textContent = '...';

        const syncBtn = document.createElement('button');
        syncBtn.className = 'sync-btn';
        syncBtn.textContent = '⟳';
        syncBtn.title = '同步数据';
        syncBtn.onclick = (e) => { e.stopPropagation(); triggerSync(t); };

        row.appendChild(btn);
        row.appendChild(metaEl);
        row.appendChild(syncBtn);
        sidebar.appendChild(row);
        tickerRows[t] = { metaEl, syncBtnEl: syncBtn, pollTimer: null };

        // Load initial status
        Promise.all([
          fetch('/api/status/' + t).then(r => r.json()).catch(() => null),
          fetch('/api/sync/status/' + t).then(r => r.json()).catch(() => null),
        ]).then(([statusData, syncData]) => {
          const syncState = syncData ? syncData.status : 'idle';
          updateTickerMeta(t, { ...(statusData || {}), sync_status: syncState });
          if (syncState === 'running') startSyncPoll(t);
        });
      });
    })
    .catch(() => {});

  // ── Auto-resize textarea ─────────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendBubble(role, text, extraClass) {
    const msg = document.createElement('div');
    msg.className = 'msg ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (extraClass ? ' ' + extraClass : '');
    bubble.textContent = text;
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  // ── Send ─────────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    removeWelcome();
    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendBubble('user', text, null);

    // Create assistant bubble for streaming
    const assistantMsg = document.createElement('div');
    assistantMsg.className = 'msg assistant';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    assistantMsg.appendChild(bubble);
    messagesEl.appendChild(assistantMsg);

    let rawText = '';
    let statusBubble = null;

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      if (!resp.ok) {
        bubble.classList.add('error');
        bubble.textContent = 'Server error: ' + resp.status;
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        // Normalize \r\n to \n before splitting (sse-starlette uses \r\n)
        buffer = buffer.replace(/\r\n/g, '\n');

        // Split on double-newline (SSE event boundary)
        const parts = buffer.split('\n\n');
        buffer = parts.pop(); // last incomplete chunk

        for (const part of parts) {
          for (const line of part.split('\n')) {
            if (!line.startsWith('data:')) continue;
            let json_str = line.slice(5).trim();
            let event;
            try { event = JSON.parse(json_str); } catch { continue; }

            if (event.type === 'session') {
              sessionId = event.session_id;

            } else if (event.type === 'status') {
              // Show italic status placeholder inside the bubble
              if (!statusBubble) {
                statusBubble = document.createElement('div');
                statusBubble.className = 'status';
                bubble.appendChild(statusBubble);
              }
              statusBubble.textContent = event.content;
              messagesEl.scrollTop = messagesEl.scrollHeight;

            } else if (event.type === 'chunk') {
              if (statusBubble) {
                statusBubble.remove();
                statusBubble = null;
              }
              rawText += event.content;
              bubble.innerHTML = marked.parse(rawText);
              messagesEl.scrollTop = messagesEl.scrollHeight;

            } else if (event.type === 'done') {
              // Final markdown render
              if (rawText) bubble.innerHTML = marked.parse(rawText);

            } else if (event.type === 'error') {
              bubble.classList.add('error');
              bubble.textContent = event.content;
            }
          }
        }
      }
    } catch (err) {
      bubble.classList.add('error');
      bubble.textContent = 'Connection error: ' + err.message;
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }
</script>
</body>
</html>
